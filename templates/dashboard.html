<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - AbhiMate AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>👋 Welcome {{ user.username }}</h1>

    <div class="card">
        <h2>📊 Account Status</h2>
        <p><b>Plan:</b> {{ "💎 Pro" if user.is_pro else "🆓 Free" }}</p>
        <p><b>Today's Usage:</b> {{ user.daily_usage }}/3</p>
    </div>

    <br>

    <a href="/">
        <button>🚀 Open AI Generator</button>
    </a>

    <br><br>

    <a href="/logout">
        <button>Logout</button>
    </a>

</div>

</body>
</html>
