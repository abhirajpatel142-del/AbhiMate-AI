<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - AbhiMate AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<div class="hero">
    <h1>👋 Welcome, {{ user.username }}</h1>
    <p>Manage your AI Creator account</p>

    <div class="hero-badges">
        <span>{{ "💎 PRO USER" if user.is_pro else "🆓 FREE USER" }}</span>
    </div>
</div>

<div class="features">

    <div class="card">
        <h3>💎 Plan</h3>
        <p>{{ "Pro Plan" if user.is_pro else "Free Plan" }}</p>
    </div>

    <div class="card">
        <h3>📊 Daily Usage</h3>
        <p>
        {% if user.is_pro %}
        Unlimited
        {% else %}
        {{ user.daily_usage }}/3
        {% endif %}
        </p>
    </div>

    <div class="card">
        <h3>⚡ AI Generator</h3>
        <a href="/">
            <button>Open</button>
        </a>
    </div>

    <div class="card">
        <h3>📜 History</h3>
        <a href="/history">
            <button>View</button>
        </a>
    </div>

</div>

<br>

<a href="/pricing">
    <button>💎 Upgrade to Pro</button>
</a>

<br><br>

<br>

<a href="/profile">
    <button>👤 My Profile</button>
</a>

<br><br>

<a href="/history">
    <button>📜 My History</button>
</a>

<br><br>

<a href="/logout">
    <button>🚪 Logout</button>
</a>

</div>

</body>
</html>
